workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  DEBIAN_FRONTEND: noninteractive
  CARGO_TARGET_DIR: $CI_PROJECT_DIR/target

stages:
  - lint
  - build
  - release

.linux-common:
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config git
    - git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/BatogiX/kodik.git ../kodik-main
    - mv ../kodik-main/Cargo.toml ../Cargo.toml
    - for d in kodik-parser kodik-utils kodik-shiki; do [ -d ../kodik-main/$d ] && mv ../kodik-main/$d ../; done
    - rm -rf ../kodik-main
  cache:
    key: ${CI_COMMIT_REF_SLUG}-linux
    paths:
      - target/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/

.linux_build_template:
  extends: .linux-common
  stage: build
  script:
    - cargo build --release -p kodik-mpv-plugin
    - mv target/release/libkodik.so target/release/kodik.so
  artifacts:
    name: kodik-mpv-plugin-linux-x86_64
    paths:
      - target/release/kodik.so
    expire_in: 1 week

.windows_build_template:
  image: rust:latest
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-windows
    paths:
      - target/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
  before_script:
    - apt-get update -qq && apt-get install -y -qq mingw-w64 git
    - git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/BatogiX/kodik.git ../kodik-main
    - mv ../kodik-main/Cargo.toml ../Cargo.toml
    - for d in kodik-parser kodik-utils kodik-shiki; do [ -d ../kodik-main/$d ] && mv ../kodik-main/$d ../; done
    - rm -rf ../kodik-main
    - rustup target add x86_64-pc-windows-gnu
  script:
    - export CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc
    - cargo build --release -p kodik-mpv-plugin --target x86_64-pc-windows-gnu
  artifacts:
    name: kodik-mpv-plugin-windows-x86_64
    paths:
      - target/x86_64-pc-windows-gnu/release/kodik.dll
    expire_in: 1 week

.android_build_template:
  image: rust:latest
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-android
    paths:
      - target/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
  variables:
    ANDROID_NDK_VERSION: "r26b"
    ANDROID_API_LEVEL: "24"
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config wget unzip git
    - git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/BatogiX/kodik.git ../kodik-main
    - mv ../kodik-main/Cargo.toml ../Cargo.toml
    - for d in kodik-parser kodik-utils kodik-shiki; do [ -d ../kodik-main/$d ] && mv ../kodik-main/$d ../; done
    - rm -rf ../kodik-main
    - wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
    - unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip -d /opt
    - export PATH=/opt/android-ndk-${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
    - rustup target add aarch64-linux-android
  script:
    - export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android${ANDROID_API_LEVEL}-clang
    - cargo build --release -p kodik-mpv-plugin --target aarch64-linux-android
    - mv target/aarch64-linux-android/release/libkodik.so target/aarch64-linux-android/release/kodik.so
  artifacts:
    name: kodik-mpv-plugin-android-aarch64
    paths:
      - target/aarch64-linux-android/release/kodik.so
    expire_in: 1 week

lint:
  extends: .linux-common
  stage: lint
  cache:
    key: ${CI_COMMIT_REF_SLUG}-lint
    paths:
      - target/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --manifest-path Cargo.toml -- --check
    - cargo clippy -p kodik-mpv-plugin --all-targets -- -D warnings
    - cargo test -p kodik-mpv-plugin
    - cargo doc -p kodik-mpv-plugin --no-deps

build:linux:x86_64:
  extends: .linux_build_template

build:windows:x86_64:
  extends: .windows_build_template

build:android:aarch64:
  extends: .android_build_template

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:linux:x86_64
      artifacts: true
    - job: build:windows:x86_64
      artifacts: true
    - job: build:android:aarch64
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache curl
  script:
    - set -e
    - |
      upload_asset() {
        if [ -f "$1" ]; then
          curl --fail --show-error --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$1" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kodik-mpv-plugin/${CI_COMMIT_TAG}/$2"
        } else
          echo "Error: Asset $1 not found!"
          exit 1
        fi
      }
      upload_asset "target/release/kodik.so" "kodik-linux.so"
      upload_asset "target/x86_64-pc-windows-gnu/release/kodik.dll" "kodik-windows.dll"
      upload_asset "target/aarch64-linux-android/release/kodik.so" "kodik-android.so"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Linux Shared Library (.so)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kodik-mpv-plugin/${CI_COMMIT_TAG}/kodik-linux.so"
        - name: "Windows Dynamic Library (.dll)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kodik-mpv-plugin/${CI_COMMIT_TAG}/kodik-windows.dll"
        - name: "Android Shared Library (.so)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kodik-mpv-plugin/${CI_COMMIT_TAG}/kodik-android.so"
